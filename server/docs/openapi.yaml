          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema:
            type: string
            description: base64 JSON {"id":"<ObjectId>"}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationsListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/notifications/read:
    post:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Пометить выбранные уведомления как прочитанные
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationsReadRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationsUpdatedResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Пометить все уведомления как прочитанные
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationsUpdatedResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/notifications/{id}:
    delete:
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      summary: Удалить уведомление
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Удалено }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ------------- UPLOADS --------------
  /api/v1/uploads/images:
    post:
      tags: [Uploads]
      summary: Загрузить изображения (multipart/form-data)
      description: |
        Ограничения берутся из config.uploads:
        maxFiles, maxMb, allowedMime.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Загружено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadImagesResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
